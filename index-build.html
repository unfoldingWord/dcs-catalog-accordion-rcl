<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCS Catalog Accordion</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="./dcs-map-and-accordion.umd.js"></script>
  <script>
    // Wait for the DOM to be fully loaded
    document.addEventListener('DOMContentLoaded', function () {
      const urlParams = new URLSearchParams(window.location.search);
      const subjects = urlParams.getAll('subject');
      const languages = urlParams.getAll('language');
      const owners = urlParams.getAll('owner');
      const stage = urlParams.get('stage') || 'prod';
      // The map and filter render by default; disable either with ?map=0 / ?filter=0.
      const showMap = urlParams.get('map') !== '0';
      const showFilter = urlParams.get('filter') !== '0';

      let dcsURL = 'https://git.door43.org';
      if (urlParams.get('server')) {
        switch (urlParams.get('server').toUpperCase()) {
          case 'QA':
            dcsURL = 'https://qa.door43.org';
            break;
          case 'PROD':
            dcsURL = 'https://git.door43.org';
            break;
          default:
            if (urlParams.get('server').startsWith('http')) {
              dcsURL = urlParams.get('server');
            }
        }
      }
      console.log("USING THIS DCS SERVER: " + dcsURL);

      // Ensure React and ReactDOM are available
      if (React && ReactDOM && DcsMapAndAccordion) {
        const { createElement } = React;
        const { createRoot } = ReactDOM;
        const { DcsCatalogBrowser } = DcsMapAndAccordion;

        // One root and one component: DcsCatalogBrowser wires the world map, the
        // stats filter and the catalog accordion together (map clicks select the
        // region's languages in the filter, the filter drives the accordion).
        createRoot(document.getElementById('dcs-catalog-browser-div')).render(
          createElement(DcsCatalogBrowser, { subjects, languages, owners, stage, dcsURL, showMap, showFilter })
        );
      } else {
        console.error('React, ReactDOM, or DcsMapAndAccordion is not available.');
      }
    });
  </script>
</head>

<body>
  <div id="dcs-catalog-browser-div" style="width: 1024px">Loading...</div>
</body>

</html>
